intro: |
  I am a Physics Engineering student at the Autonomous University of San Luis Potosí (UASLP). My experience there amounts to learning, designing, and building projects around programming, web development, optics, electronics, and  chemistry. Generally my outputs combine a mix of code, hands-on experiments, and mathematical analysis of physical phenomena.
  <br/>
  Other than science I also enjoy making, listening, and performing music. I have been part of many musical projects throughout the years, mixing and producing music. As of now my band's music is primarily based on my own compositions and arrangements, and is only available to listen on YouTube <a target="_blank" href="https://www.youtube.com/@%C6%8EXHME">here</a>.
  <br/>
  Finally I have also a range of side projects and hobbies that I tend to such as building open source tools (mostly for my personal use), reading on any kind of literature that crosses my path from economic theory to science fiction, playing videogames, and spending time with family and friends.


